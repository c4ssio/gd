<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRICK BREAKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --glow-cyan: #00f5ff;
    --glow-pink: #ff007f;
    --glow-yellow: #ffe600;
    --border: rgba(0,245,255,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,0,127,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
    pointer-events: none; z-index: 100;
  }
  /* Single scaler div — JS sets transform: scale() to fit viewport */
  #scaler {
    position: absolute; top: 0; left: 0;
    width: 480px;
    transform-origin: top left;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 6px;
    color: #fff; font-family: 'Orbitron', monospace;
  }
  header { margin-bottom: 8px; text-align: center; }
  h1 {
    font-size: 1.7rem; font-weight: 900; letter-spacing: 0.25em;
    color: var(--glow-cyan);
    text-shadow: 0 0 20px var(--glow-cyan), 0 0 40px rgba(0,245,255,0.4);
    animation: flicker 6s infinite;
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1} 96%{opacity:0.85} 97%{opacity:1} 98%{opacity:0.9} 99%{opacity:1}
  }
  .hud {
    display: flex; gap: 32px; margin-bottom: 7px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { color: rgba(255,255,255,0.4); font-size: 0.6rem; letter-spacing: 0.2em; }
  .hud-value { color: var(--glow-yellow); font-size: 1rem; text-shadow: 0 0 10px rgba(255,230,0,0.6); }
  .canvas-wrap {
    position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,245,255,0.05), 0 0 30px rgba(0,245,255,0.1), inset 0 0 30px rgba(0,0,0,0.5);
  }
  canvas { display: block; background: #080f1e; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,10,20,0.88); backdrop-filter: blur(4px);
    gap: 18px; transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.2em; text-align: center; line-height: 1.3; }
  .overlay-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-align: center; }
  .btn {
    background: transparent; border: 1px solid var(--glow-cyan); color: var(--glow-cyan);
    font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.2em; padding: 10px 28px; cursor: pointer; transition: all 0.2s;
    text-shadow: 0 0 8px var(--glow-cyan); box-shadow: 0 0 15px rgba(0,245,255,0.15);
  }
  .btn:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 25px rgba(0,245,255,0.35); transform: scale(1.04); }
  .pu-legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 5px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.52rem; color: rgba(255,255,255,0.28);
    letter-spacing: 0.05em; max-width: 460px;
  }
  .pu-legend span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  footer { margin-top: 5px; font-family: 'Share Tech Mono', monospace; font-size: 0.52rem; color: rgba(255,255,255,0.16); letter-spacing: 0.1em; }
</style>
</head>
<body>
<div id="scaler">

<header><h1>BRICK BREAKER</h1></header>

<div class="hud">
  <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-value" id="scoreDisplay">0</span></div>
  <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-value" id="levelDisplay">1</span></div>
  <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-value" id="livesDisplay">♥ ♥ ♥</span></div>
</div>

<div class="canvas-wrap">
  <canvas id="game" width="480" height="520"></canvas>
  <div id="overlay">
    <div class="overlay-title" id="overlayTitle" style="color:var(--glow-cyan);text-shadow:0 0 20px var(--glow-cyan);">READY?</div>
    <div class="overlay-sub" id="overlaySub">DRAG TO MOVE · TAP TO LAUNCH</div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>
</div>

<div class="pu-legend">
  <span><span class="dot" style="background:#ff4400"></span>ZAP — clears column</span>
  <span><span class="dot" style="background:#0066ff"></span>3-BALL</span>
  <span><span class="dot" style="background:#aa00ff"></span>WIDE paddle</span>
  <span><span class="dot" style="background:#00ff88"></span>SPEED boost</span>
</div>

<footer>DRAG TO MOVE PADDLE &nbsp;|&nbsp; TAP TO LAUNCH</footer>

</div><!-- end #scaler -->

<script>
// ═══════════════════════════════════════════════
// RESPONSIVE SCALER
// Scales the entire #scaler div to fit the viewport,
// keeping the 480px game width as the reference.
// Touch/mouse coords are divided by scale so game
// logic always works in native 480px coordinates.
// ═══════════════════════════════════════════════
const scaler = document.getElementById('scaler');
let currentScale = 1;

function rescale() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // Measure natural height of scaler at scale=1
  scaler.style.transform = 'scale(1)';
  const naturalH = scaler.scrollHeight;
  const scaleByW = vw / 480;
  const scaleByH = vh / naturalH;
  currentScale = Math.min(scaleByW, scaleByH, 1); // never upscale past 1
  const scaledW = 480 * currentScale;
  const scaledH = naturalH * currentScale;
  scaler.style.transform = `scale(${currentScale})`;
  // Center it
  scaler.style.left = ((vw - scaledW) / 2) + 'px';
  scaler.style.top  = ((vh - scaledH) / 2) + 'px';
}

window.addEventListener('resize', rescale);
// Run after fonts/layout settle
window.addEventListener('load', rescale);
setTimeout(rescale, 100);
setTimeout(rescale, 400);

// Helper: convert a clientX to canvas-space X
function clientToCanvas(clientX) {
  const rect = canvas.getBoundingClientRect();
  // getBoundingClientRect already reflects the CSS scale transform
  return (clientX - rect.left) / currentScale;
}
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub   = document.getElementById('overlaySub');
const startBtn     = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const livesDisplay = document.getElementById('livesDisplay');

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const BALL_R      = 7;
const BASE_SPEED  = 4.5;
const PADDLE_H    = 10;
const PADDLE_W    = 90;
const BRICK_W     = 44, BRICK_H = 16, BRICK_GAP = 4;
const BRICK_COLS  = 9;
const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFFSET_Y = 44;
const PU_W = 28, PU_H = 18, PU_SPEED = 1.8;

// ═══════════════════════════════════════════════
// BRICK COLORS (row 0 = top = hardest)
// ═══════════════════════════════════════════════
const BRICK_COLORS = [
  { fill:'#ff007f', glow:'rgba(255,0,127,0.7)',   pts:50 },
  { fill:'#ff6600', glow:'rgba(255,102,0,0.7)',   pts:40 },
  { fill:'#ffe600', glow:'rgba(255,230,0,0.7)',   pts:30 },
  { fill:'#00ff88', glow:'rgba(0,255,136,0.7)',   pts:20 },
  { fill:'#00f5ff', glow:'rgba(0,245,255,0.7)',   pts:10 },
  { fill:'#bb44ff', glow:'rgba(187,68,255,0.7)',  pts:35 },
  { fill:'#ff88aa', glow:'rgba(255,136,170,0.7)', pts:25 },
];

// ═══════════════════════════════════════════════
// LEVEL PATTERNS  — 8 levels total
// Each returns array of {r,c,hp,colorIdx} objects
// ═══════════════════════════════════════════════
function levelPattern(lvl) {
  const bricks = [];
  function add(r, c, hp, ci) {
    if (c < 0 || c >= BRICK_COLS) return;
    bricks.push({ r, c, hp, colorIdx: ci });
  }

  if (lvl === 1) {
    // Classic full grid, 5 rows
    for (let r = 0; r < 5; r++)
      for (let c = 0; c < BRICK_COLS; c++)
        add(r, c, r < 2 ? 2 : 1, r);

  } else if (lvl === 2) {
    // PYRAMID — widest at bottom, pointed at top
    // Row 0 (top): 1 brick in center
    // Each row adds 2 bricks outward
    const rows = 5;
    for (let r = 0; r < rows; r++) {
      const count  = (r + 1) * 2 - 1;   // 1,3,5,7,9
      const start  = Math.floor((BRICK_COLS - count) / 2);
      for (let c = start; c < start + count; c++)
        add(r, c, r === 0 ? 2 : 1, r);
    }

  } else if (lvl === 3) {
    // DIAMOND — hollow center ring + solid fill inside
    // Outer ring of a 9×7 diamond shape
    const cx = 4; // center col
    for (let r = 0; r < 7; r++) {
      const half = r <= 3 ? r : 6 - r;
      for (let c = cx - half; c <= cx + half; c++) {
        const isEdge = (c === cx - half || c === cx + half || r === 0 || r === 6);
        add(r, c, isEdge ? 2 : 1, isEdge ? 0 : 3);
      }
    }

  } else if (lvl === 4) {
    // CHECKERBOARD — alternating filled and empty cells
    for (let r = 0; r < 6; r++)
      for (let c = 0; c < BRICK_COLS; c++)
        if ((r + c) % 2 === 0) add(r, c, r < 2 ? 2 : 1, r % BRICK_COLORS.length);

  } else if (lvl === 5) {
    // FORTRESS — outer wall with empty interior and a gate
    for (let r = 0; r < 6; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const isTop    = r === 0;
        const isBottom = r === 5;
        const isLeft   = c === 0;
        const isRight  = c === BRICK_COLS - 1;
        const isGate   = isBottom && (c === 3 || c === 4 || c === 5); // gate in bottom wall
        if ((isTop || isBottom || isLeft || isRight) && !isGate)
          add(r, c, 2, isTop ? 0 : 1);
      }
    }
    // Treasure in center
    add(2, 4, 3, 5);
    add(3, 4, 3, 5);

  } else if (lvl === 6) {
    // HERRINGBONE — alternating diagonal offsets (staggered columns)
    for (let r = 0; r < 6; r++) {
      const offset = r % 2 === 0 ? 0 : 1;
      for (let c = 0; c < BRICK_COLS - offset; c += 2) {
        add(r, c + offset, 2, r % BRICK_COLORS.length);
      }
    }

  } else if (lvl === 7) {
    // CROSS / PLUS — vertical + horizontal bars crossing in center
    for (let r = 0; r < 7; r++)
      for (let c = 0; c < BRICK_COLS; c++) {
        const inVert = c === 4;
        const inHorz = r === 3;
        if (inVert || inHorz)
          add(r, c, (inVert && inHorz) ? 3 : 2, inVert && inHorz ? 5 : (inVert ? 0 : 2));
      }

  } else if (lvl === 8) {
    // GAUNTLET — full dense grid, more 2-hp bricks, speed is brutal
    for (let r = 0; r < 7; r++)
      for (let c = 0; c < BRICK_COLS; c++)
        add(r, c, r < 4 ? 2 : 1, r % BRICK_COLORS.length);
  }

  return bricks;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = 'idle';
let score = 0, lives = 3, level = 1;
let bricks = [], particles = [], powerups = [], lasers = [];
let balls = [];
let wideTimer = 0, speedTimer = 0;

let paddle = { x: W/2 - PADDLE_W/2, y: H - 36, w: PADDLE_W, h: PADDLE_H };

// ═══════════════════════════════════════════════
// BRICK BUILDER
// ═══════════════════════════════════════════════
function buildBricks() {
  bricks = [];
  for (const b of levelPattern(level)) {
    bricks.push({
      x: BRICK_OFFSET_X + b.c * (BRICK_W + BRICK_GAP),
      y: BRICK_OFFSET_Y + b.r * (BRICK_H + BRICK_GAP),
      w: BRICK_W, h: BRICK_H,
      col: b.c, row: b.r,
      alive: true,
      hp: b.hp,
      color: BRICK_COLORS[b.colorIdx % BRICK_COLORS.length],
    });
  }
}

// ═══════════════════════════════════════════════
// BALLS
// ═══════════════════════════════════════════════
// Primary ball = index 0 → always yellow
// Extra balls (triball) get cyan/pink colors
const EXTRA_BALL_COLORS = ['#00f5ff','#ff007f','#00ff88','#bb44ff'];

function makeBall(x, y, vx, vy, launched=true, isPrimary=false) {
  return { x, y, vx, vy, launched, isPrimary };
}

function resetBalls() {
  balls = [makeBall(
    paddle.x + paddle.w/2, paddle.y - BALL_R - 2,
    0, 0, false, true
  )];
}

function launchBall() {
  const b = balls[0];
  if (!b || b.launched) return;
  b.launched = true;
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
  const spd = currentSpeed();
  b.vx = Math.cos(angle)*spd; b.vy = Math.sin(angle)*spd;
}

function currentSpeed() {
  const base = BASE_SPEED + (level-1)*0.35;
  return speedTimer > 0 ? base * 1.65 : base;
}

// ═══════════════════════════════════════════════
// POWER-UPS
// ═══════════════════════════════════════════════
// Types: 'laser' | 'triball' | 'wide' | 'speed'
const PU_TYPES  = ['laser','triball','wide','speed'];
const PU_CFG = {
  laser:   { fill:'#ff4400', glow:'rgba(255,68,0,0.8)',    label:'ZAP' },
  triball: { fill:'#0066ff', glow:'rgba(0,102,255,0.8)',   label:'×3'  },
  wide:    { fill:'#aa00ff', glow:'rgba(170,0,255,0.8)',   label:'↔'   },
  speed:   { fill:'#00ff88', glow:'rgba(0,255,136,0.8)',   label:'▶▶'  },
};

function tryDropPowerup(brick) {
  if (Math.random() > 0.3) return;
  const type = PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  powerups.push({ x: brick.x + brick.w/2 - PU_W/2, y: brick.y, type, col: brick.col });
}

function collectPowerup(pu) {
  if (pu.type === 'wide') {
    const cx = paddle.x + paddle.w/2;
    paddle.w = Math.min(PADDLE_W*2, paddle.w + 55);
    paddle.x = Math.max(0, Math.min(W-paddle.w, cx-paddle.w/2));
    wideTimer = 600;
  } else if (pu.type === 'triball') {
    const ref = balls.find(b=>b.launched) || balls[0];
    const spd = currentSpeed();
    const colorIdx = balls.length % EXTRA_BALL_COLORS.length;
    for (let i=0;i<2;i++) {
      const angle = -Math.PI/2 + (i===0?-0.6:0.6);
      const nb = makeBall(ref.x, ref.y, Math.cos(angle)*spd, Math.sin(angle)*spd, true, false);
      nb.extraColor = EXTRA_BALL_COLORS[(balls.length+i) % EXTRA_BALL_COLORS.length];
      balls.push(nb);
    }
  } else if (pu.type === 'laser') {
    fireLaserCol(pu.col);
  } else if (pu.type === 'speed') {
    speedTimer = 480; // ~8 seconds
    // Re-normalize all launched balls to new speed
    for (const b of balls) {
      if (!b.launched) continue;
      const spd = Math.sqrt(b.vx**2+b.vy**2);
      const target = currentSpeed();
      b.vx = (b.vx/spd)*target; b.vy = (b.vy/spd)*target;
    }
  }
}

// ═══════════════════════════════════════════════
// LASERS
// ═══════════════════════════════════════════════
function fireLaserCol(col) {
  lasers.push({ x: BRICK_OFFSET_X + col*(BRICK_W+BRICK_GAP)+BRICK_W/2, y: paddle.y, col, life:1 });
}

function updateLasers(dt) {
  for (let i=lasers.length-1;i>=0;i--) {
    const beam = lasers[i];
    beam.y -= 16 * dt;
    // Hit bricks in this column
    for (const b of bricks) {
      if (!b.alive || b.col !== beam.col) continue;
      if (beam.y < b.y+b.h && beam.y > b.y-8) {
        b.hp--;
        if (b.hp <= 0) {
          b.alive = false; score += b.color.pts*level;
          spawnParticles(b.x+b.w/2, b.y+b.h/2, b.color.fill);
          updateHUD(); tryDropPowerup(b);
        }
      }
    }
    if (beam.y < 0) lasers.splice(i,1);
  }
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles(x, y, color) {
  for (let i=0;i<12;i++) {
    const a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3.5;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color, size:2+Math.random()*3 });
  }
}

// ═══════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════
function startGame() {
  score=0; lives=3; level=1;
  paddle.w=PADDLE_W; paddle.x=W/2-paddle.w/2;
  wideTimer=0; speedTimer=0; powerups=[]; lasers=[]; particles=[];
  buildBricks(); resetBalls(); updateHUD();
  state='playing';
  overlay.classList.add('hidden');
  lastTime=0;
  requestAnimationFrame(loop);
}

function levelClear() {
  state = 'levelclear';
  powerups=[]; lasers=[];
  const LEVEL_NAMES = ['','CLASSIC','PYRAMID','DIAMOND','CHECKERBOARD','FORTRESS','HERRINGBONE','CROSS','GAUNTLET'];
  if (level >= 8) {
    // Full game win
    showOverlay(
      '🏆 YOU WIN!',
      `ALL 8 STAGES CLEARED · FINAL SCORE: ${score}`,
      'PLAY AGAIN',
      'var(--glow-yellow)'
    );
    state = 'win';
  } else {
    showOverlay(
      `STAGE ${level} CLEAR!`,
      `${LEVEL_NAMES[level]} COMPLETE · SCORE: ${score}`,
      `START STAGE ${level+1}`,
      'var(--glow-cyan)'
    );
  }
}

function nextLevel() {
  level++;
  paddle.w=PADDLE_W; paddle.x=W/2-paddle.w/2;
  wideTimer=0; speedTimer=0; powerups=[]; lasers=[];
  buildBricks(); resetBalls(); updateHUD();
  state='playing';
  overlay.classList.add('hidden');
  lastTime = 0;
  requestAnimationFrame(loop);
}

function loseLife() {
  lives--; updateHUD();
  powerups=[]; lasers=[];
  if (lives<=0) {
    state='dead';
    showOverlay('GAME OVER',`SCORE: ${score}`,'PLAY AGAIN');
  } else {
    paddle.w=PADDLE_W; paddle.x=W/2-paddle.w/2;
    wideTimer=0; resetBalls();
  }
}

function updateHUD() {
  scoreDisplay.textContent=score;
  levelDisplay.textContent=level;
  livesDisplay.textContent='♥ '.repeat(lives).trim();
}

function showOverlay(title,sub,btn,col='var(--glow-pink)') {
  overlayTitle.textContent=title;
  overlayTitle.style.color=col;
  overlayTitle.style.textShadow=`0 0 20px ${col}`;
  overlaySub.textContent=sub;
  startBtn.textContent=btn;
  overlay.classList.remove('hidden');
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
let dragActive=false, touchStartX=null, touchStartPaddleX=null, touchMoved=false;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchStartX = clientToCanvas(t.clientX);
  touchStartPaddleX=paddle.x; touchMoved=false; dragActive=true;
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault(); if(!dragActive)return;
  const t=e.touches[0];
  const delta = clientToCanvas(t.clientX) - touchStartX;
  if(Math.abs(delta)>4) touchMoved=true;
  paddle.x=Math.max(0,Math.min(W-paddle.w,touchStartPaddleX+delta));
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault(); dragActive=false;
  if(!touchMoved && state==='playing') launchBall();
  touchMoved=false;
},{passive:false});

let mouseDown=false, mouseDragStartX=null, mouseDragStartPaddleX=null, mouseMoved=false;
canvas.addEventListener('mousedown', e=>{
  mouseDragStartX = clientToCanvas(e.clientX);
  mouseDragStartPaddleX=paddle.x; mouseDown=true; mouseMoved=false;
});
canvas.addEventListener('mousemove', e=>{
  if(!mouseDown)return;
  const delta = clientToCanvas(e.clientX) - mouseDragStartX;
  if(Math.abs(delta)>4) mouseMoved=true;
  paddle.x=Math.max(0,Math.min(W-paddle.w,mouseDragStartPaddleX+delta));
});
canvas.addEventListener('mouseup', ()=>{
  if(!mouseMoved && state==='playing') launchBall();
  mouseDown=false; mouseMoved=false;
});
canvas.addEventListener('mouseleave', ()=>{ mouseDown=false; });

document.addEventListener('keydown', e=>{
  if(e.code==='Space' && state==='playing') launchBall();
  if(e.code==='ArrowLeft')  paddle.x=Math.max(0,paddle.x-20);
  if(e.code==='ArrowRight') paddle.x=Math.min(W-paddle.w,paddle.x+20);
});

startBtn.addEventListener('click', ()=>{
  if (state==='idle' || state==='dead' || state==='win') startGame();
  else if (state==='levelclear') nextLevel();
});

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function loop(ts) {
  if (state !== 'playing' && state !== 'levelclear') return;
  const dt = Math.min((ts - lastTime) / 16.67, 3); lastTime = ts;
  if (state === 'playing') update(dt);
  // Keep ticking particles during clear screen
  else { for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.03; } particles=particles.filter(p=>p.life>0); }
  draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════
function update(dt) {
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  // Power-up timers
  if(wideTimer>0){ wideTimer--;
    if(wideTimer===0){ const cx=paddle.x+paddle.w/2; paddle.w=PADDLE_W; paddle.x=Math.max(0,Math.min(W-paddle.w,cx-paddle.w/2)); }
  }
  if(speedTimer>0){ speedTimer--;
    if(speedTimer===0){
      // Slow back down
      for(const b of balls){ if(!b.launched)continue; const sp=Math.sqrt(b.vx**2+b.vy**2); const t2=currentSpeed(); b.vx=(b.vx/sp)*t2; b.vy=(b.vy/sp)*t2; }
    }
  }

  // Balls
  if(balls.length>0 && !balls[0].launched){
    balls[0].x=paddle.x+paddle.w/2; balls[0].y=paddle.y-BALL_R-2;
  }

  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i]; if(!b.launched) continue;
    b.x+=b.vx*dt; b.y+=b.vy*dt;

    if(b.x-BALL_R<0){ b.x=BALL_R; b.vx=Math.abs(b.vx); }
    if(b.x+BALL_R>W){ b.x=W-BALL_R; b.vx=-Math.abs(b.vx); }
    if(b.y-BALL_R<0){ b.y=BALL_R; b.vy=Math.abs(b.vy); }
    if(b.y-BALL_R>H){ if(i===0){ loseLife(); return; } else { balls.splice(i,1); continue; } }

    // Paddle
    if(b.vy>0 && b.y+BALL_R>=paddle.y && b.y-BALL_R<=paddle.y+paddle.h && b.x>=paddle.x && b.x<=paddle.x+paddle.w){
      b.vy=-Math.abs(b.vy);
      const rel=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      b.vx=rel*BASE_SPEED*1.2;
      const sp=Math.sqrt(b.vx**2+b.vy**2), tgt=currentSpeed();
      b.vx=(b.vx/sp)*tgt; b.vy=(b.vy/sp)*tgt;
    }

    // Bricks
    for(const br of bricks){
      if(!br.alive) continue;
      if(b.x+BALL_R>br.x && b.x-BALL_R<br.x+br.w && b.y+BALL_R>br.y && b.y-BALL_R<br.y+br.h){
        br.hp--;
        if(br.hp<=0){ br.alive=false; score+=br.color.pts*level; spawnParticles(br.x+br.w/2,br.y+br.h/2,br.color.fill); updateHUD(); tryDropPowerup(br); }
        const ox=Math.min(b.x+BALL_R-br.x,br.x+br.w-(b.x-BALL_R));
        const oy=Math.min(b.y+BALL_R-br.y,br.y+br.h-(b.y-BALL_R));
        if(ox<oy) b.vx*=-1; else b.vy*=-1;
        break;
      }
    }
  }

  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i]; pu.y+=PU_SPEED*dt;
    if(pu.y+PU_H>=paddle.y && pu.y<=paddle.y+paddle.h && pu.x+PU_W>=paddle.x && pu.x<=paddle.x+paddle.w){
      collectPowerup(pu); powerups.splice(i,1); continue;
    }
    if(pu.y>H) powerups.splice(i,1);
  }

  updateLasers(dt);

  // Particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; }
  particles=particles.filter(p=>p.life>0);

  // Win check
  if (bricks.every(b=>!b.alive)) {
    levelClear();
  }
}

// ═══════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════
function drawBall(b) {
  ctx.save();
  if(b.isPrimary){
    // Yellow primary
    ctx.shadowColor='rgba(255,230,0,0.9)'; ctx.shadowBlur=20;
    const g=ctx.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,BALL_R);
    g.addColorStop(0,'#fff9c4'); g.addColorStop(0.5,'#ffe600'); g.addColorStop(1,'#ff9900');
    ctx.fillStyle=g;
  } else {
    // Colored extras
    const c=b.extraColor||'#00f5ff';
    ctx.shadowColor=c; ctx.shadowBlur=18;
    const g=ctx.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,BALL_R);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,c); g.addColorStop(1,c+'88');
    ctx.fillStyle=g;
  }
  ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPowerup(pu) {
  const cfg=PU_CFG[pu.type];
  ctx.save(); ctx.shadowColor=cfg.glow; ctx.shadowBlur=14;

  if(pu.type==='triball'){
    // Blue platform + ball on top
    ctx.fillStyle='#0055cc';
    ctx.beginPath(); ctx.roundRect(pu.x,pu.y+PU_H-7,PU_W,7,3); ctx.fill();
    const bx=pu.x+PU_W/2, by=pu.y+PU_H-7-BALL_R;
    ctx.shadowColor='rgba(255,230,0,0.9)'; ctx.shadowBlur=12;
    const g=ctx.createRadialGradient(bx-1,by-1,1,bx,by,BALL_R);
    g.addColorStop(0,'#fff9c4'); g.addColorStop(0.5,'#ffe600'); g.addColorStop(1,'#ff9900');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,BALL_R,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle=cfg.fill;
    ctx.beginPath(); ctx.roundRect(pu.x,pu.y,PU_W,PU_H,5); ctx.fill();
    const sg=ctx.createLinearGradient(pu.x,pu.y,pu.x,pu.y+PU_H);
    sg.addColorStop(0,'rgba(255,255,255,0.35)'); sg.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.roundRect(pu.x,pu.y,PU_W,PU_H,5); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font='bold 9px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(cfg.label, pu.x+PU_W/2, pu.y+PU_H/2);
  }
  ctx.restore();
}

function drawLasers() {
  for(const beam of lasers){
    ctx.save();
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=18;
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(beam.x,beam.y); ctx.lineTo(beam.x,0); ctx.stroke();
    ctx.strokeStyle='#ffee88'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(beam.x,beam.y); ctx.lineTo(beam.x,0); ctx.stroke();
    ctx.restore();
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Grid bg
  ctx.strokeStyle='rgba(0,245,255,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Speed boost screen edge flash
  if(speedTimer>0 && speedTimer%20<10){
    ctx.save(); ctx.strokeStyle='rgba(0,255,136,0.18)'; ctx.lineWidth=8;
    ctx.strokeRect(0,0,W,H); ctx.restore();
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive) continue;
    ctx.save(); ctx.globalAlpha=b.hp<2?1:0.7;
    ctx.shadowColor=b.color.glow; ctx.shadowBlur=10;
    ctx.fillStyle=b.color.fill; ctx.fillRect(b.x,b.y,b.w,b.h);
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,'rgba(255,255,255,0.3)'); g.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle=g; ctx.fillRect(b.x,b.y,b.w,b.h);
    // hp indicator dot for 2-hp bricks
    if(b.hp>=2){
      ctx.shadowBlur=0; ctx.globalAlpha=0.8;
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(b.x+b.w-6,b.y+b.h/2,2.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  drawLasers();

  // Particles
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  for(const pu of powerups) drawPowerup(pu);

  // Paddle
  ctx.save();
  const pGlow = wideTimer>0 ? 'rgba(170,0,255,0.9)' : speedTimer>0 ? 'rgba(0,255,136,0.9)' : 'rgba(0,245,255,0.8)';
  const pTop  = wideTimer>0 ? '#cc44ff' : speedTimer>0 ? '#00ff88' : '#00f5ff';
  const pBot  = wideTimer>0 ? '#660099' : speedTimer>0 ? '#008844' : '#0088aa';
  ctx.shadowColor=pGlow; ctx.shadowBlur=18;
  const pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  pg.addColorStop(0,pTop); pg.addColorStop(1,pBot);
  ctx.fillStyle=pg; ctx.beginPath();
  ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,paddle.h/2); ctx.fill();
  ctx.restore();

  for(const b of balls) drawBall(b);

  // Launch hint
  if(state==='playing' && balls.length>0 && !balls[0].launched){
    ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(Date.now()/300);
    ctx.fillStyle='#fff'; ctx.font='700 11px Orbitron'; ctx.textAlign='center';
    ctx.fillText('TAP TO LAUNCH',W/2,paddle.y-20); ctx.restore();
  }

  // Wide timer bar
  if(wideTimer>0){
    ctx.save(); ctx.fillStyle='rgba(170,0,255,0.25)'; ctx.fillRect(0,H-4,W,4);
    ctx.fillStyle='#cc44ff'; ctx.shadowColor='#cc44ff'; ctx.shadowBlur=6;
    ctx.fillRect(0,H-4,W*(wideTimer/600),4); ctx.restore();
  }
  // Speed timer bar
  if(speedTimer>0){
    ctx.save(); ctx.fillStyle='rgba(0,255,136,0.25)'; ctx.fillRect(0,H-4,W,4);
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=6;
    ctx.fillRect(0,H-4,W*(speedTimer/480),4); ctx.restore();
  }

  // Level name overlay
  if(state==='playing'){
    ctx.save(); ctx.globalAlpha=0.22;
    ctx.fillStyle='#fff'; ctx.font='700 9px Share Tech Mono'; ctx.textAlign='right';
    const names=['','CLASSIC','PYRAMID','DIAMOND','CHECKERBOARD','FORTRESS','HERRINGBONE','CROSS','GAUNTLET'];
    ctx.fillText(names[level]||'', W-6, H-8); ctx.restore();
  }
}

// Initial draw
buildBricks(); resetBalls(); draw();
</script>
