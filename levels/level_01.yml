# Geometry Dash Level Configuration
# Level 01: First Steps (Tutorial Level)

metadata:
  name: "First Steps"
  id: "level_01"
  difficulty: "Easy"
  description: "A simple introduction to Geometry Dash mechanics"
  author: "System"
  version: "1.0.0"
  
# Level settings
settings:
  # Player starting configuration
  player:
    start_x: 100
    start_y: 370  # Player height is 30, so y=370 puts player bottom at y=400 (ground level)
    start_mode: "cube"
    start_speed: "normal"  # normal, slow, fast, very_fast
    start_size: "normal"  # normal, mini, large
    start_gravity: "down"  # down, up
    
  # Level dimensions and scrolling
  level:
    length: 2200  # Total level length in pixels (extended for better ending)
    ground_height: 400  # Y position of ground level
    ceiling_height: 0  # Y position of ceiling
    end_zone:
      x: 2000  # Start of end zone (finish line area)
      width: 200  # Width of end zone (wider for visibility)
      finish_line_x: 2200  # Exact finish line position
    
  # Visual theme
  theme:
    background_color: "#1a1a2e"
    ground_color: "#16213e"
    obstacle_color: "#0f3460"
    accent_color: "#e94560"
    
  # Music settings
  music:
    track: "tutorial_track.mp3"  # Path to music file
    bpm: 120  # Beats per minute for sync
    offset: 0  # Music start offset in seconds
    
# Level objects
objects:
  # Platforms (solid ground the player can land on)
  platforms:
    - id: "platform_01"
      type: "ground"
      x: 0
      y: 400
      width: 500
      height: 50
      color: "#16213e"
      
    - id: "platform_02"
      type: "platform"
      x: 550  # Moved closer to give more time to prepare jump
      y: 340  # 60 pixels above ground (reachable with 90 pixel jump)
      width: 250  # Wider platform for easier landing
      height: 30
      color: "#0f3460"
      
    - id: "platform_03"
      type: "platform"
      x: 850  # Moved closer for easier transition
      y: 280  # 120 pixels above ground, 60 pixels above platform_02 (reachable from platform_02)
      width: 250  # Wider platform for easier landing
      height: 30
      color: "#0f3460"
      
    - id: "platform_04"
      type: "ground"
      x: 1150  # Moved closer for easier drop from platform_03
      y: 400
      width: 1050  # Extended to reach end zone
      height: 50
      color: "#16213e"
      
  # Obstacles (cause death on contact)
  obstacles:
    # Spikes
    - id: "spike_01"
      type: "spike"
      x: 520  # Before platform_02 to encourage jumping
      y: 400
      width: 50
      height: 50
      rotation: 0  # 0 = up, 180 = down, 90 = left, 270 = right
      color: "#e94560"
      
    - id: "spike_02"
      type: "spike"
      x: 820  # Before platform_03 to encourage jumping
      y: 400
      width: 50
      height: 50
      rotation: 0
      color: "#e94560"
      
    - id: "spike_03"
      type: "spike"
      x: 1120  # Before final ground section
      y: 400
      width: 50
      height: 50
      rotation: 0
      color: "#e94560"
      
    # Walls (solid barriers) - removed for tutorial level to keep it simple
      
  # Moving platforms
  moving_platforms:
    - id: "moving_platform_01"
      type: "horizontal"
      x: 1350  # Moved closer to final ground section
      y: 340  # Same height as platform_02 for consistency
      width: 150
      height: 30
      color: "#0f3460"
      movement:
        pattern: "linear"  # linear, circular, sine
        start_x: 1350
        end_x: 1550
        start_y: 340
        end_y: 340
        speed: 0.015  # Progress per frame (0.0 to 1.0) - smooth movement (~67 frames for full cycle)
        loop: true
        
  # Portals
  portals:
    # Mode portals (change player mode)
    mode_portals: []  # None in first level - keeping it simple
    
    # Speed portals
    speed_portals: []  # None in first level
    
    # Gravity portals
    gravity_portals: []  # None in first level
    
    # Size portals
    size_portals: []  # None in first level
    
    # Teleport portals
    teleport_portals: []  # None in first level
    
  # Jump pads (launch player upward)
  jump_pads:
    - id: "jump_pad_01"
      x: 1100  # On final ground section
      y: 400
      width: 50
      height: 20
      force: 15  # Launch force
      color: "#00ff88"
      
  # Collectibles
  collectibles:
    # Stars
    stars:
      - id: "star_01"
        x: 250
        y: 350  # Above starting ground
        size: 20
        color: "#ffd700"
        
      - id: "star_02"
        x: 650  # Centered on platform_02
        y: 310  # Above platform_02
        size: 20
        color: "#ffd700"
        
      - id: "star_03"
        x: 950  # Centered on platform_03
        y: 250  # Above platform_03
        size: 20
        color: "#ffd700"
        
    # Coins
    coins:
      - id: "coin_01"
        x: 600  # On platform_02
        y: 320  # Slightly above platform_02 surface
        size: 15
        color: "#ffaa00"
        is_secret: false
        
      - id: "coin_02"
        x: 900  # On platform_03
        y: 260  # Slightly above platform_03 surface
        size: 15
        color: "#ffaa00"
        is_secret: false
        
  # Checkpoints (for practice mode)
  checkpoints:
    - id: "checkpoint_01"
      x: 950  # Near platform_03
      y: 250  # Near platform_03
      width: 30
      height: 50
      color: "#00ffff"
      
  # Decorative elements (non-interactive)
  decorations:
    - id: "decoration_01"
      type: "block"
      x: 300
      y: 100
      width: 40
      height: 40
      color: "#4a4a6a"
      alpha: 0.5  # Transparency
      
# Music sync points (optional - for beat synchronization)
sync_points:
  - beat: 1
    time: 0.0
    event: "start"
    
  - beat: 8
    time: 4.0
    event: "first_jump"
    
  - beat: 16
    time: 8.0
    event: "platform_section"
    
  - beat: 24
    time: 12.0
    event: "moving_platform"
    
  - beat: 32
    time: 16.0
    event: "end_zone"
    
  - beat: 36
    time: 18.0
    event: "finish"

