name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    name: Build, Archive, Upload
    runs-on: macos-15   # Xcode 26 is pre-installed on macos-15 runners

    env:
      SCHEME: SwiftST
      BUNDLE_ID: PaesLemeST
      TEAM_ID: J8D7WJR5PY
      ARCHIVE_PATH: ${{ github.workspace }}/build/SwiftST.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      KEYCHAIN_NAME: build.keychain

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode 26 ─────────────────────────────────────────────────
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      # ── 3. Increment build number ──────────────────────────────────────────
      - name: Set build number
        run: |
          sed -i '' \
            "s/bundleVersion: \"[^\"]*\"/bundleVersion: \"${{ github.run_number }}\"/" \
            SwiftST.swiftpm/Package.swift
          echo "Build number → ${{ github.run_number }}"

      # ── 4. Show available schemes (diagnostic) ─────────────────────────────
      - name: List schemes
        working-directory: SwiftST.swiftpm
        run: xcodebuild -list 2>&1 || true

      # ── 5. Create temporary keychain ───────────────────────────────────────
      - name: Create temporary keychain
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_NAME
          security set-keychain-settings -lut 21600 $KEYCHAIN_NAME
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_NAME
          security list-keychains -d user -s $KEYCHAIN_NAME $(security list-keychains -d user | xargs)

      # ── 6. Import distribution certificate ────────────────────────────────
      - name: Import distribution certificate
        run: |
          echo "${{ secrets.CERTIFICATES_P12 }}" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k $KEYCHAIN_NAME \
            -P "${{ secrets.CERTIFICATES_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
            $KEYCHAIN_NAME
          rm /tmp/cert.p12

      # ── 7. Install provisioning profile ───────────────────────────────────
      - name: Install provisioning profile
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > /tmp/profile.mobileprovision
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision "$PP_DIR/$UUID.mobileprovision"
          echo "PP_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed provisioning profile: $UUID"

      # ── 8. Set up App Store Connect API key ───────────────────────────────
      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" \
            > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # ── 9. Archive ─────────────────────────────────────────────────────────
      # Run from inside SwiftST.swiftpm — xcodebuild detects Package.swift
      # automatically; passing -project to a .swiftpm directory is not valid.
      - name: Archive
        working-directory: SwiftST.swiftpm
        run: |
          mkdir -p "$ARCHIVE_PATH"
          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME"

      # ── 10. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          mkdir -p "$EXPORT_PATH"
          # Inject the provisioning profile UUID into ExportOptions.plist
          /usr/libexec/PlistBuddy -c \
            "Set :provisioningProfiles:PaesLemeST $PP_UUID" \
            ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

      # ── 11. Upload to TestFlight ───────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find "$EXPORT_PATH" -name "*.ipa" | head -1)" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}" \
            --verbose

      # ── 12. Clean up ───────────────────────────────────────────────────────
      - name: Clean up
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_NAME || true
          rm -f ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
